<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #e0e0e0;
      width: 280px;
      padding: 20px;
    }
    h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    p {
      font-size: 12px;
      color: #999;
      margin-bottom: 14px;
    }
    label {
      font-size: 12px;
      color: #aaa;
      display: block;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 9px 12px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a3e;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #1a73e8; }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #1565c0, #1a73e8);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.88; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .ok  { color: #4caf50; }
    .err { color: #f44336; }
  </style>
</head>
<body>
  <h2>♟ Chesskit Analyzer</h2>
  <p>Tu usuario de Chess.com (solo se configura una vez)</p>
  <label>Nombre de usuario</label>
  <input id="username" type="text" placeholder="Ej: FranVault" />
  <button id="save">Guardar</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
