<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #e0e0e0;
      width: 280px;
      padding: 20px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #1565c0, #1a73e8);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    h2 {
      font-size: 15px; font-weight: 700; color: #fff;
    }
    .subtitle { font-size: 11px; color: #666; margin-top: 1px; }
    p {
      font-size: 12px; color: #888;
      margin-bottom: 14px; line-height: 1.5;
    }
    label { font-size: 12px; color: #aaa; display: block; margin-bottom: 5px; }
    input {
      width: 100%; padding: 9px 12px;
      border-radius: 6px; border: 1px solid #444;
      background: #2a2a3e; color: #fff;
      font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #1a73e8; }
    input::placeholder { color: #555; }
    button {
      margin-top: 12px; width: 100%; padding: 10px;
      background: linear-gradient(135deg, #1565c0, #1a73e8);
      color: #fff; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.88; }
    #status { margin-top: 10px; font-size: 12px; text-align: center; min-height: 16px; }
    .ok  { color: #4caf50; }
    .err { color: #f44336; }
    .divider { border: none; border-top: 1px solid #2a2a3e; margin: 16px 0; }
    .tip { font-size: 11px; color: #555; line-height: 1.5; }
    .tip span { color: #1a73e8; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">♟</div>
    <div>
      <h2>Chesskit Analyzer</h2>
      <div class="subtitle">Chess.com → Chesskit in one click</div>
    </div>
  </div>

  <p>Your Chess.com username (only set once)</p>
  <label>Username</label>
  <input id="username" type="text" placeholder="e.g. FranVault" />
  <button id="save">Save</button>
  <div id="status"></div>

  <hr class="divider">
  <div class="tip">After a game ends, click <span>♟ Analyze in Chesskit</span> to jump straight to analysis.</div>

  <script src="popup.js"></script>
</body>
</html>
